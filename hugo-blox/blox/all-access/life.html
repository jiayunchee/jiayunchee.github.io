<section class="life-blox py-12 max-w-5xl mx-auto px-4">
  <h2 class="text-3xl font-bold mb-4">{{ .content.title }}</h2>
  <p class="text-gray-700 mb-8">{{ .content.text }}</p>

  <div class="grid md:grid-cols-3 gap-8">
    {{ range .content.items }}
      <div class="life-item border rounded-lg overflow-hidden shadow hover:shadow-lg transition p-4">
        <img src="/images/{{ .image }}" alt="{{ .title }}" class="w-full h-48 object-cover mb-4 rounded">
        <h3 class="text-xl font-semibold mb-2">{{ .title }}</h3>
        <p class="text-gray-600">{{ .description | markdownify }}</p>
      </div>
    {{ end }}
  </div>
</section>
